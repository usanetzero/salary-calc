      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Bar chart bars -->
  <rect x="80" y="310" width="60" height="110" rx="10" fill="white" opacity="0.45"/>
  <rect x="160" y="240" width="60" height="180" rx="10" fill="white" opacity="0.65"/>
  <rect x="240" y="170" width="60" height="250" rx="10" fill="white" opacity="0.9"/>
